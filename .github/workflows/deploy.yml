# UAT + production deploy with manual approval gates (GitHub Environments).
#
# Flow:
#   PR opened/updated → verify (auto) → deploy-uat (waits for "uat" approval)
#   merge to main     → verify (auto) → deploy-production (waits for "production" approval)
#
# Setup: docs/UAT-DEPLOYMENT.md

name: Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - uat
          - production
      ref:
        description: Git ref (branch or SHA)
        required: false
        default: main

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  NODE_VERSION: '22'
  PUBLIC_SITE_URL_PROD: https://onboarding.orangecloud.vn

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL_UAT || 'https://uat.onboarding.orangecloud.vn' }}
        run: npm run build

      - name: Start preview
        run: |
          npx astro preview --host 127.0.0.1 --port 4321 &
          echo $! > preview.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4321/ >/dev/null; then
              echo "Preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview failed to start"
          exit 1

      - name: Smoke test
        run: npm run test:smoke

      - name: Stop preview
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" 2>/dev/null || true
          fi

  deploy-uat:
    name: Stage 1 — UAT
    needs: verify
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'uat')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: uat
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for UAT
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL_UAT || 'https://uat.onboarding.orangecloud.vn' }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (UAT)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="${{ vars.CF_PAGES_PROJECT_UAT || 'cloudflare-starter-hub-uat' }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="pr-${{ github.event.pull_request.number }}"
          else
            BRANCH="manual-${{ github.run_id }}"
          fi
          LOG=$(mktemp)
          npx wrangler pages deploy dist \
            --project-name="$PROJECT" \
            --branch="$BRANCH" \
            --commit-dirty=true 2>&1 | tee "$LOG"
          URL=$(grep -oE 'https://[a-z0-9-]+\.[a-z0-9.-]+\.pages\.dev' "$LOG" | tail -1)
          if [ -z "$URL" ]; then
            echo "Could not parse deployment URL from wrangler output"
            exit 1
          fi
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed UAT: $URL (branch $BRANCH)"

      - name: Smoke test UAT
        run: node scripts/smoke-test.mjs "${{ steps.deploy.outputs.deployment-url }}"

      - name: Comment UAT URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const pr = context.payload.pull_request.number;
            const body = `## UAT deployed\n\n**Preview:** ${url}\n\nApproved via environment \`uat\`. Re-test after new commits — Stage 1 approval is required again.\n\nWhen UAT looks good, merge to \`main\` and approve **production** in the Deploy workflow.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const marker = '<!-- uat-deploy -->';
            const existing = comments.find((c) => c.body?.includes(marker));
            const text = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: text,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: text,
              });
            }

  deploy-production:
    name: Stage 2 — Production
    needs: verify
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ env.PUBLIC_SITE_URL_PROD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build for production
        env:
          PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL_PROD }}
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="${{ vars.CF_PAGES_PROJECT_PROD || 'cloudflare-starter-hub' }}"
          LOG=$(mktemp)
          npx wrangler pages deploy dist \
            --project-name="$PROJECT" \
            --commit-dirty=true 2>&1 | tee "$LOG"
          URL=$(grep -oE 'https://[a-z0-9-]+\.[a-z0-9.-]+\.pages\.dev' "$LOG" | tail -1)
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed production Pages URL: $URL"
          echo "Custom domain: ${{ env.PUBLIC_SITE_URL_PROD }}"

      - name: Smoke test production
        run: |
          node scripts/smoke-test.mjs "${{ steps.deploy.outputs.deployment-url }}"
          node scripts/smoke-test.mjs "${{ env.PUBLIC_SITE_URL_PROD }}"
